<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Size with Counter</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050510;
            overflow: hidden;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }

        /* --- UI Container --- */
        .container {
            z-index: 10;
            text-align: center;
            background: rgba(0, 0, 0, 0.7);
            padding: 40px 60px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        button {
            padding: 15px 35px;
            font-size: 18px;
            cursor: pointer;
            background: white;
            color: #050510;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.6);
        }

        button:active {
            transform: scale(0.95);
        }

        /* --- The "Big" or "Small" Result Text --- */
        #result {
            height: 100px; /* Fixed height to prevent jumping */
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .res-big {
            font-size: 80px;
            color: #00ccff;
            text-shadow: 0 0 30px #00ccff;
            font-weight: 900;
        }

        .res-small {
            font-size: 16px;
            color: #ffcc00;
            text-shadow: 0 0 10px #ffcc00;
            font-weight: 400;
        }

        /* --- The Counters --- */
        .stats {
            display: flex;
            justify-content: space-around;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 20px;
            font-size: 18px;
        }

        .stat-box {
            display: flex;
            flex-direction: column;
            padding: 0 20px;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-number {
            font-size: 24px;
            font-weight: bold;
            margin-top: 5px;
        }

        #count-big { color: #00ccff; }
        #count-small { color: #ffcc00; }

        /* --- Background Animation --- */
        .orb {
            position: absolute;
            border-radius: 50%;
            opacity: 0.5;
            pointer-events: none;
            animation: float linear infinite;
        }
        .blue { background: #00ccff; box-shadow: 0 0 20px #00ccff; }
        .yellow { background: #ffcc00; box-shadow: 0 0 20px #ffcc00; }

        @keyframes float {
            0% { transform: translateY(0); opacity: 0.2; }
            50% { transform: translateY(-20px); opacity: 0.6; }
            100% { transform: translateY(0); opacity: 0.2; }
        }
    </style>
</head>
<body>

    <div class="container">
        <button onclick="generateRandom()">Roll</button>
        
        <div id="result">Click to start</div>

        <div class="stats">
            <div class="stat-box">
                <span class="stat-label">Big Count</span>
                <span id="count-big" class="stat-number">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Small Count</span>
                <span id="count-small" class="stat-number">0</span>
            </div>
        </div>
    </div>

    <script>
        // 1. Initialize Variables to track the score
        let bigCounter = 0;
        let smallCounter = 0;

        function generateRandom() {
            const resultDiv = document.getElementById('result');
            const bigDisplay = document.getElementById('count-big');
            const smallDisplay = document.getElementById('count-small');
            
            // Generate Random number (0 to 1)
            const randomValue = Math.random();

            // Reset classes
            resultDiv.className = '';

            if (randomValue > 0.5) {
                // --- BIG RESULT ---
                resultDiv.innerText = "BIG";
                resultDiv.classList.add('res-big');
                
                // Update Counter
                bigCounter++;
                bigDisplay.innerText = bigCounter;

            } else {
                // --- SMALL RESULT ---
                resultDiv.innerText = "small";
                resultDiv.classList.add('res-small');
                
                // Update Counter
                smallCounter++;
                smallDisplay.innerText = smallCounter;
            }
        }

        // 2. Background Lights (Visuals)
        const body = document.querySelector('body');
        for (let i = 0; i < 50; i++) {
            const orb = document.createElement('div');
            const isBlue = Math.random() > 0.5;
            orb.classList.add('orb', isBlue ? 'blue' : 'yellow');
            
            const size = Math.random() * 40 + 5;
            orb.style.width = size + 'px';
            orb.style.height = size + 'px';
            orb.style.left = Math.random() * 100 + 'vw';
            orb.style.top = Math.random() * 100 + 'vh';
            orb.style.animationDuration = (Math.random() * 5 + 3) + 's';
            orb.style.animationDelay = '-' + (Math.random() * 5) + 's';
            
            body.appendChild(orb);
        }
    </script>
</body>
</html>
